name: flockkeeper
description: "Flock Keeper Chicken Flock Management Application"
publish_to: 'none'

version: 1.2.8+58

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.2
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.6.0+eol
  intl: ^0.20.2
  path: ^1.9.0
  fl_chart: ^1.2.0
  image_picker: ^1.1.2
  google_fonts: ^8.1.0
  path_provider: ^2.1.3
  csv: ^8.0.0
  excel: ^4.0.0
  file_picker: ^8.0.0
  pdf: ^3.10.8
  printing: ^5.11.1
  syncfusion_flutter_pdf: ^33.2.13
  supabase_flutter: ^2.6.0
  in_app_purchase: ^3.2.0
  speech_to_text: ^7.3.0
  flutter_dotenv: ^6.0.1
  flutter_tts: ^4.0.2
  app_links: ^7.2.0
  package_info_plus: ^9.0.1

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  local_notifier: ^0.1.6
  flutter_local_notifications: ^17.0.0
  url_launcher: ^6.3.2
  msix: ^3.17.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.0
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.8
  riverpod_generator: ^4.0.4
  riverpod_lint: ^3.1.4
  flutter_launcher_icons: ^0.14.4

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/images/splash.jpg
    - assets/images/home_background.png
    - assets/images/home_logo.png
    - forms/NKR DNA Request Form 050126 (1).pdf
    - forms/NKR Dual Register Form 050126.pdf
    - forms/NKR Order Form-Fees 050126 (1).pdf
    - forms/NKR Registration Application 050126 (1).pdf
    - forms/NKR transfer form-050126 (1).pdf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon.png"
  windows:
    generate: true
    icon_size: 256

msix_config:
  display_name: FlockKeeper
  publisher_display_name: Clear Creek Forge
  identity_name: ClearCreekForge.FlockKeeper
  publisher: CN=F1731E09-BA98-40F1-817A-844A1EEAC797
  logo_path: assets/images/icon.png
  capabilities: internetClient
  sign_msix: false
  store: true
